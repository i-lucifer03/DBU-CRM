<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DBU Master Data Management</title>

    <!-- ===== STYLES ===== -->
    <link rel="stylesheet" href="style/main.css" />
    <link rel="stylesheet" href="style/layout.css" />
    <link rel="stylesheet" href="style/forms.css" />
    <link rel="stylesheet" href="style/tables.css" />
    <link rel="stylesheet" href="style/wizard.css" />
    <link rel="stylesheet" href="style/components.css" />

    <!-- Google Font (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>

    <!-- ===== APP SHELL ===== -->
    <div id="app" class="app-shell">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <i class="fas fa-university"></i>
                </div>
                <span class="brand-name">DBU <span class="brand-light">MDM</span></span>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="#dashboard" class="nav-link active" data-view="dashboard">
                            <i class="fas fa-th-large"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="#programs" class="nav-link" data-view="programs">
                            <i class="fas fa-graduation-cap"></i>
                            <span>Programs</span>
                        </a>
                    </li>
                    <li>
                        <a href="#fees" class="nav-link" data-view="fees">
                            <i class="fas fa-coins"></i>
                            <span>Fee Manager</span>
                        </a>
                    </li>
                    <li>
                        <a href="#approvals" class="nav-link" data-view="approvals">
                            <i class="fas fa-check-circle"></i>
                            <span>Approvals</span>
                        </a>
                    </li>
                    <li>
                        <a href="#international" class="nav-link" data-view="international">
                            <i class="fas fa-globe-americas"></i>
                            <span>International</span>
                        </a>
                    </li>
                    <li>
                        <a href="#reports" class="nav-link" data-view="reports">
                            <i class="fas fa-chart-bar"></i>
                            <span>Reports</span>
                        </a>
                    </li>
                    <li>
                        <a href="#settings" class="nav-link" data-view="settings">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">Counsellor</span>
                        <span class="user-role">Admissions</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <div class="main-wrapper">

            <!-- ===== HEADER ===== -->
            <header class="app-header" id="appHeader">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>

                <div class="header-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="globalSearch" placeholder="Search programs, faculty, country..." aria-label="Global search" />
                    </div>

                    <button class="header-btn" id="notifBtn" aria-label="Notifications">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>

                    <button class="header-btn" id="darkModeToggle" aria-label="Toggle dark mode">
                        <i class="fas fa-moon"></i>
                    </button>

                    <div class="header-user">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </header>

            <!-- ===== VIEWPORT ===== -->
            <main class="app-main" id="appMain">
                <!-- Views are rendered here dynamically -->
                <div id="viewContainer"></div>
            </main>

        </div>
    </div>

    <!-- ===== TOAST CONTAINER ===== -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ===== MODAL CONTAINER ===== -->
    <div id="modalContainer" class="modal-container"></div>

    <!-- ===== JAVASCRIPT ===== -->
    <script type="importmap">
        {
            "imports": {
                "/js/app.js": "./js/app.js",
                "/js/dashboard.js": "./js/dashboard.js",
                "/js/wizard.js": "./js/wizard.js",
                "/js/programs.js": "./js/programs.js",
                "/js/validation.js": "./js/validation.js",
                "/js/helpers.js": "./js/helpers.js",
                "/js/storage.js": "./js/storage.js",
                "/js/google.js": "./js/google.js",
                "/js/reports.js": "./js/reports.js",
                "/js/fees.js": "./js/fees.js",
                "/js/international.js": "./js/international.js",
                "/js/phd.js": "./js/phd.js",
                "/js/bihar.js": "./js/bihar.js"
            }
        }
    </script>

    <script type="module" src="js/app.js"></script>

</body>
</html>
